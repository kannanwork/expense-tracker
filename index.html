<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; padding: 1rem 1rem 4rem; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1rem; }
    .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .card { background: #ebebeb; border-radius: 10px; padding: 12px 14px; }
    .card-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .card-value { font-size: 20px; font-weight: 500; }
    .tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .tab { flex: 1; padding: 7px 0; font-size: 13px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; cursor: pointer; text-transform: capitalize; }
    .tab.active { border: 1.5px solid #555; font-weight: 500; background: #fff; }
    .panel { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
    input[type=number], input[type=text] { width: 100%; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #888; }
    .cats { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .cat-btn { padding: 5px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; }
    .cat-btn.active { font-weight: 500; }
    .add-btn { width: 100%; padding: 9px; border-radius: 8px; font-size: 14px; font-weight: 500; border: 0.5px solid #bbb; background: #f0f0f0; cursor: pointer; }
    .add-btn:hover { background: #e5e5e5; }
    .expense-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid #ddd; border-radius: 10px; margin-bottom: 8px; background: #fff; }
    .icon-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .exp-info { flex: 1; min-width: 0; }
    .exp-cat { font-size: 13px; font-weight: 500; }
    .exp-note { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exp-amount { font-size: 14px; font-weight: 500; flex-shrink: 0; }
    .del-btn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 18px; padding: 0 0 0 4px; line-height: 1; }
    .del-btn:hover { color: #e24b4a; }
    .bar-row { margin-bottom: 12px; }
    .bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .bar-bg { height: 6px; border-radius: 3px; background: #eee; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-pct { font-size: 11px; color: #aaa; margin-top: 2px; }
    .summary-total { margin-top: 16px; padding-top: 12px; border-top: 0.5px solid #ddd; display: flex; justify-content: space-between; font-size: 14px; }
    .empty { font-size: 14px; color: #aaa; text-align: center; padding: 2rem 0; }
    .month-label { font-size: 12px; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="app">
  <h1>Expense Tracker</h1>
  <div class="summary">
    <div class="card">
      <div class="card-label" id="today-label">Today · 0 expenses</div>
      <div class="card-value" id="today-total">AED 0.00</div>
    </div>
    <div class="card">
      <div class="card-label" id="month-label">This Month · 0 expenses</div>
      <div class="card-value" id="month-total">AED 0.00</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">Add</button>
    <button class="tab" onclick="switchTab('history')">History</button>
    <button class="tab" onclick="switchTab('summary')">Summary</button>
  </div>
  <div id="tab-add" class="panel">
    <label>Amount (AED)</label>
    <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
    <label>Category</label>
    <div class="cats" id="cat-buttons"></div>
    <label>Note (optional)</label>
    <input type="text" id="note" placeholder="e.g. Lunch at work" />
    <button class="add-btn" onclick="addExpense()">Add Expense</button>
  </div>
  <div id="tab-history" style="display:none">
    <div id="history-list"></div>
  </div>
  <div id="tab-summary" style="display:none">
    <div class="month-label" id="month-name"></div>
    <div id="summary-bars"></div>
  </div>
</div>
<script>
const CATS = [
  { name: "Food & Drink", icon: "🍽", color: "#D85A30" },
  { name: "Transport",    icon: "🚗", color: "#378ADD" },
  { name: "Shopping",     icon: "🛍", color: "#7F77DD" },
  { name: "Entertainment",icon: "🎬", color: "#D4537E" },
  { name: "Health",       icon: "💊", color: "#1D9E75" },
  { name: "Bills",        icon: "📄", color: "#BA7517" },
  { name: "Other",        icon: "📌", color: "#888780" },
];

let expenses = JSON.parse(localStorage.getItem("expenses") || "[]");
let selCat = CATS[0].name;
let curTab = "add";

const fmt = n => "AED " + Number(n).toLocaleString("en-AE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const todayStr = () => new Date().toISOString().slice(0, 10);
const save = () => localStorage.setItem("expenses", JSON.stringify(expenses));
const catOf = name => CATS.find(c => c.name === name) || CATS[6];

function switchTab(t) {
  curTab = t;
  ["add","history","summary"].forEach(id => {
    document.getElementById("tab-" + id).style.display = id === t ? "block" : "none";
  });
  document.querySelectorAll(".tab").forEach((el, i) => {
    el.classList.toggle("active", ["add","history","summary"][i] === t);
  });
  if (t === "history") renderHistory();
  if (t === "summary") renderSummary();
}

function renderCatButtons() {
  const el = document.getElementById("cat-buttons");
  el.innerHTML = CATS.map(c => `
    <button class="cat-btn${c.name === selCat ? " active" : ""}"
      style="${c.name === selCat ? `border:1.5px solid ${c.color};background:${c.color}22;` : ""}"
      onclick="selectCat('${c.name}')">${c.icon} ${c.name}</button>
  `).join("");
}

function selectCat(name) { selCat = name; renderCatButtons(); }

function addExpense() {
  const val = parseFloat(document.getElementById("amount").value);
  if (!val || val <= 0) return;
  const note = document.getElementById("note").value.trim();
  expenses.unshift({ id: Date.now(), amount: val, category: selCat, note, date: todayStr() });
  save(); renderAll();
  document.getElementById("amount").value = "";
  document.getElementById("note").value = "";
}

function delExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  save(); renderAll();
  if (curTab === "history") renderHistory();
  if (curTab === "summary") renderSummary();
}

function renderSummary() {
  const mon = todayStr().slice(0, 7);
  const mExp = expenses.filter(e => e.date.startsWith(mon));
  const mTotal = mExp.reduce((s, e) => s + e.amount, 0);
  const byCat = CATS.map(c => ({ ...c, total: mExp.filter(e => e.category === c.name).reduce((s, e) => s + e.amount, 0) }))
    .filter(c => c.total > 0).sort((a, b) => b.total - a.total);
  const d = new Date(); 
  document.getElementById("month-name").textContent = "Spending by category — " + d.toLocaleString("en-AE", { month: "long", year: "numeric" });
  const el = document.getElementById("summary-bars");
  if (!byCat.length) { el.innerHTML = '<div class="empty">No data this month.</div>'; return; }
  el.innerHTML = byCat.map(c => {
    const pct = mTotal > 0 ? (c.total / mTotal * 100) : 0;
    return `<div class="bar-row">
      <div class="bar-header"><span>${c.icon} ${c.name}</span><span style="font-weight:500">${fmt(c.total)}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${c.color}"></div></div>
      <div class="bar-pct">${Math.round(pct)}% of monthly spend</div>
    </div>`;
  }).join("") + `<div class="summary-total"><span>Total this month</span><span style="font-weight:500">${fmt(mTotal)}</span></div>`;
}

function renderHistory() {
  const el = document.getElementById("history-list");
  if (!expenses.length) { el.innerHTML = '<div class="empty">No expenses yet.</div>'; return; }
  el.innerHTML = expenses.map(e => {
    const c = catOf(e.category);
    return `<div class="expense-item">
      <div class="icon-circle" style="background:${c.color}22">${c.icon}</div>
      <div class="exp-info">
        <div class="exp-cat">${e.category}</div>
        <div class="exp-note">${e.note || "—"} · ${e.date}</div>
      </div>
      <div class="exp-amount">${fmt(e.amount)}</div>
      <button class="del-btn" onclick="delExpense(${e.id})">×</button>
    </div>`;
  }).join("");
}

function renderAll() {
  const tod = todayStr();
  const mon = tod.slice(0, 7);
  const tExp = expenses.filter(e => e.date === tod);
  const mExp = expenses.filter(e => e.date.startsWith(mon));
  document.getElementById("today-label").textContent = `Today · ${tExp.length} expense${tExp.length !== 1 ? "s" : ""}`;
  document.getElementById("today-total").textContent = fmt(tExp.reduce((s, e) => s + e.amount, 0));
  document.getElementById("month-label").textContent = `This Month · ${mExp.length} expense${mExp.length !== 1 ? "s" : ""}`;
  document.getElementById("month-total").textContent = fmt(mExp.reduce((s, e) => s + e.amount, 0));
}

renderCatButtons();
renderAll();
document.getElementById("amount").addEventListener("keydown", e => e.key === "Enter" && addExpense());
document.getElementById("note").addEventListener("keydown", e => e.key === "Enter" && addExpense());
</script>
</body>
</html>
